<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Ruta/Caja — control diario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>Ruta<span class="slash">/</span>Caja</h1>
        <span class="app-header-sub">control diario</span>
      </header>

      <main id="app-content" class="app-content"></main>

      <nav class="tabbar">
        <button data-tab="jornada" class="active">
          <svg viewBox="0 0 24 24" width="19" height="19"><path fill="currentColor" d="M3 13h2l1.5-4.5A2 2 0 0 1 8.4 7h7.2a2 2 0 0 1 1.9 1.5L19 13h2v2h-1.2a2.5 2.5 0 0 1-4.9.5H9.1A2.5 2.5 0 0 1 4.2 15H3v-2Zm4.5 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm9 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2ZM8.4 9l-1 3.5h9.2L15.6 9H8.4Z"/></svg>
          <span>Viajes</span>
        </button>
        <button data-tab="cierre">
          <svg viewBox="0 0 24 24" width="19" height="19"><path fill="currentColor" d="M6 2h12a1 1 0 0 1 1 1v18l-2-1-2 1-2-1-2 1-2-1-2 1-2-1V3a1 1 0 0 1 1-1Zm2 5h8v1.5H8V7Zm0 3.5h8V12H8v-1.5Zm0 3.5h5v1.5H8V14Z"/></svg>
          <span>Cierre</span>
        </button>
        <button data-tab="billeteras">
          <svg viewBox="0 0 24 24" width="19" height="19"><path fill="currentColor" d="M3 7a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v1h1a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Zm14 4a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Z"/></svg>
          <span>Billeteras</span>
        </button>
        <button data-tab="metricas">
          <svg viewBox="0 0 24 24" width="19" height="19"><path fill="currentColor" d="M4 20V10h3v10H4Zm6.5 0V4h3v16h-3ZM17 20v-7h3v7h-3Z"/></svg>
          <span>Métricas</span>
        </button>
      </nav>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
